apiVersion: apps/v1
kind: Deployment
metadata:
  name: dnsmasq-deployment
  labels:
    app: dnsmasq
spec:
  replicas: 1
  # Recreate (not RollingUpdate) is required for hostPort workloads:
  # RollingUpdate attempts to start the new pod before terminating the old one,
  # but since both need hostPort 53, the scheduler rejects the new pod with
  # FailedScheduling until the old pod's sandbox is fully released.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dnsmasq
  template:
    metadata:
      namespace: dnsmasq
      labels:
        app: dnsmasq
    spec:
      hostNetwork: true
      # DNS is critical infrastructure - schedule before other workloads
      priorityClassName: system-node-critical
      # Minimize the DNS gap on restarts: terminate quickly once SIGTERM is sent
      terminationGracePeriodSeconds: 5
      containers:
      - name: dnsmasq
        image: vcf.lab/dnsmasq
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 53
          hostPort: 53
          name: dns-tcp
          protocol: TCP
        - containerPort: 53
          hostPort: 53
          name: dns-udp
          protocol: UDP
        - containerPort: 67
          hostPort: 67
          name: dhcp
          protocol: UDP
        securityContext:
          capabilities:
            drop: [all]
            add: [NET_ADMIN,NET_RAW,NET_BIND_SERVICE]
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: 1
            memory: 3Gi
        livenessProbe:
          tcpSocket:
            port: 53
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          tcpSocket:
            port: 53
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 3
        volumeMounts:
          - mountPath: '/etc/dnsmasq.conf'
            name: config-volume
            readOnly: true
            subPath: dnsmasq.conf
          - mountPath: '/etc/hosts'
            name: config-volume
            readOnly: true
            subPath: hosts
      volumes:
        - name: config-volume
          configMap:
            name: dnsmasq
